<!DOCTYPE html>
<html lang="{{ 'en' if lang == 'en' else 'pt-BR' }}" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processando...</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/halfmoon.min.css') }}">
<style>
@font-face { font-family:'Geist'; src:url("{{ url_for('static', filename='fonts/geist-400.woff2') }}") format('woff2'); font-weight:400; font-display:swap; }
@font-face { font-family:'Geist'; src:url("{{ url_for('static', filename='fonts/geist-500.woff2') }}") format('woff2'); font-weight:500; font-display:swap; }
@font-face { font-family:'Geist'; src:url("{{ url_for('static', filename='fonts/geist-600.woff2') }}") format('woff2'); font-weight:600; font-display:swap; }
@font-face { font-family:'Geist'; src:url("{{ url_for('static', filename='fonts/geist-700.woff2') }}") format('woff2'); font-weight:700; font-display:swap; }
:root { --bs-body-font-family: 'Geist', -apple-system, system-ui, sans-serif; --bs-body-bg: #09090b; }
body { font-family: var(--bs-body-font-family); background: var(--bs-body-bg); color: #fafafa; }

.lw { max-width: 520px; margin: 50px auto; padding: 0 20px; }
.lc { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 48px 36px; }
.lh { text-align: center; margin-bottom: 36px; }
.spinner { width: 56px; height: 56px; border: 3px solid rgba(255,255,255,.06); border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
@keyframes spin { to { transform: rotate(360deg); } }
.timer { font-size: 40px; font-weight: 700; font-variant-numeric: tabular-nums; color: #fafafa; letter-spacing: 2px; }
.prog { font-size: 13px; color: #71717a; margin-top: 8px; min-height: 20px; }
.sl { position: relative; padding: 0; margin: 0; list-style: none; }
.sl::before { content: ''; position: absolute; left: 15px; top: 8px; bottom: 8px; width: 2px; background: #27272a; }
.si { position: relative; padding: 14px 0 14px 48px; display: flex; justify-content: space-between; align-items: center; }
.sd { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; border-radius: 50%; background: #27272a; border: 2px solid #3f3f46; z-index: 1; transition: all .3s; }
.slab { font-size: 14px; color: #52525b; transition: color .3s; flex: 1; }
.st { font-size: 12px; font-variant-numeric: tabular-nums; color: #52525b; min-width: 45px; text-align: right; }
.si.done .sd { background: #22c55e; border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.15); }
.si.done .sd::after { content:''; position:absolute; left:4px; top:2px; width:5px; height:8px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg); }
.si.done .slab { color: #a1a1aa; }
.si.done .st { color: #22c55e; }
.si.active .sd { background: #3b82f6; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,.2); animation: dp 1.5s infinite; }
.si.active .slab { color: #fafafa; font-weight: 500; }
.si.active .st { color: #3b82f6; }
@keyframes dp { 0%,100%{box-shadow:0 0 0 3px rgba(59,130,246,.2)} 50%{box-shadow:0 0 0 6px rgba(59,130,246,.1)} }
.finished .spinner { display: none; }
.finished .timer { color: #22c55e; }
</style>
</head>
<body>
<div class="lw">
  <div class="lc">
    <div class="lh" id="hb">
      <div class="spinner"></div>
      <div class="timer" id="timer">0:00</div>
      <div class="prog" id="prog">{{ 'Starting...' if lang == 'en' else 'Iniciando...' }}</div>
    </div>
    <ul class="sl">
      <li class="si active" id="s-db"><span class="sd"></span><span class="slab">{{ t.loading_step_db }}</span><span class="st" id="t-db"></span></li>
      <li class="si" id="s-read"><span class="sd"></span><span class="slab">{{ t.loading_step_read }}</span><span class="st" id="t-read"></span></li>
      <li class="si" id="s-analyze"><span class="sd"></span><span class="slab">{{ t.loading_step_analyze }}</span><span class="st" id="t-analyze"></span></li>
      <li class="si" id="s-wellness"><span class="sd"></span><span class="slab">{{ t.loading_step_wellness }}</span><span class="st" id="t-wellness"></span></li>
      <li class="si" id="s-translate"><span class="sd"></span><span class="slab">{{ t.loading_step_translate }}</span><span class="st" id="t-translate"></span></li>
      <li class="si" id="s-conclude"><span class="sd"></span><span class="slab">{{ t.loading_step_conclude }}</span><span class="st" id="t-conclude"></span></li>
    </ul>
  </div>
</div>
<script>
const jid="{{job_id}}";let sec=0;const te=document.getElementById('timer'),pe=document.getElementById('prog');
setInterval(()=>{sec++;const m=Math.floor(sec/60),s=sec%60;te.textContent=m+':'+String(s).padStart(2,'0');},1000);
const sids=['s-db','s-read','s-analyze','s-wellness','s-translate','s-conclude'];
const tids=['t-db','t-read','t-analyze','t-wellness','t-translate','t-conclude'];
const sst={0:0};let li=0;
function fmt(s){return s<60?s+'s':Math.floor(s/60)+'m '+(s%60)+'s';}
function upd(step){
  let i=Math.max(li, Math.min(Math.max(step|0,0), sids.length-1));
  if(i!==li){if(sst[li]!==undefined)document.getElementById(tids[li]).textContent=fmt(sec-sst[li]);sst[i]=sec;li=i;}
  if(sst[i]!==undefined)document.getElementById(tids[i]).textContent=fmt(sec-sst[i]);
  sids.forEach((id,j)=>{const e=document.getElementById(id);e.classList.remove('active','done');if(j<i)e.classList.add('done');else if(j===i)e.classList.add('active');});
}
// While the job is still on step 0 (Loading databases), poll the DB
// sub-status endpoint so the user sees "Loading ClinVar (12s)…" instead
// of a silent spinner. ClinVar is 289 MB and genuinely takes 30-90s on
// first start, so silence here reads as "the app froze".
const DB_LABELS={
  'clinvar':"{{ 'Loading ClinVar (289 MB · first run takes 30-90s)' if lang == 'en' else 'Carregando ClinVar (289 MB · primeira vez leva 30-90s)' }}",
  'pharmgkb':"{{ 'Loading PharmGKB' if lang == 'en' else 'Carregando PharmGKB' }}",
  'ready':"{{ 'Databases ready' if lang == 'en' else 'Bancos prontos' }}",
};
let dbDone=false;
function dbsub(){
  if(li>0||dbDone)return;
  fetch('/api/db-status').then(r=>r.json()).then(d=>{
    if(d.loaded){dbDone=true;return;}
    if(DB_LABELS[d.current]){
      const elapsed=d.elapsed_seconds?' ('+Math.round(d.elapsed_seconds)+'s)':'';
      pe.textContent=DB_LABELS[d.current]+elapsed;
    }
  }).catch(()=>{});
}
setInterval(dbsub,1000);
function chk(){fetch('/status/'+jid).then(r=>r.json()).then(d=>{
  // Step 0 = DB loading: let dbsub() own the message so we don't overwrite
  // the sub-progress with the generic "Carregando bancos de dados…".
  if(d.step>0||dbDone){pe.textContent=d.progress||pe.textContent;}
  upd(d.step);
if(d.status==='done'){if(sst[li]!==undefined)document.getElementById(tids[li]).textContent=fmt(sec-sst[li]);sids.forEach(id=>{const e=document.getElementById(id);e.classList.remove('active');e.classList.add('done');});pe.textContent='{{ t.loading_done }}';document.getElementById('hb').classList.add('finished');setTimeout(()=>{window.location.href='/done/'+jid;},800);}
else if(d.status==='error'){pe.textContent='{{ t.loading_error }}: '+(d.error||'{{ "unknown" if lang == "en" else "desconhecido" }}');document.querySelector('.spinner').style.display='none';te.style.color='#ef4444';}
else setTimeout(chk,800);}).catch(()=>setTimeout(chk,2000));}
chk();
</script>
</body>
</html>
