name: Gene Lens CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest flake8

      - name: Lint - syntax errors and undefined names
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=static,genetics-docs,.venv

      - name: Lint - warnings (non-blocking)
        run: |
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=150 --statistics --exclude=static,genetics-docs,.venv

      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short

      - name: Validate i18n parity
        run: |
          python -c "
          from src.i18n import STRINGS
          pt = set(STRINGS['pt'].keys())
          en = set(STRINGS['en'].keys())
          assert pt == en, f'i18n mismatch — PT only: {pt-en}, EN only: {en-pt}'
          print(f'OK: PT={len(pt)} keys, EN={len(en)} keys, symmetric')
          "

  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history to diff PARENT..HEAD

      - name: Check for genome-shaped data outside sample/
        run: |
          echo "Scanning for rsid<sep>chr<sep>pos<sep>genotype rows in non-sample files..."
          # Match both TSV and CSV genome shapes: rsNNNN<tab|,>chr<tab|,>pos<tab|,>[AGCT]{1,2}
          MATCHES=$(git ls-files \
            | grep -v '^sample/' \
            | grep -v '^genetics-docs/' \
            | xargs -I{} grep -l -E "^rs[0-9]+[	,][0-9XYMT]+[	,][0-9]+[	,][AGCT]{1,2}" {} 2>/dev/null || true)
          if [ -n "$MATCHES" ]; then
            echo "ERROR: Real-looking genome data found outside sample/:"
            echo "$MATCHES"
            exit 1
          fi
          echo "OK: No genome-shaped data found outside sample/"

      - name: Verify sample/ fixtures are marked synthetic
        run: |
          echo "Every file in sample/ must contain SYNTHETIC in its first 5 lines..."
          FAIL=0
          for f in $(git ls-files 'sample/*'); do
            # Skip README and similar docs
            case "$f" in
              sample/README.md|sample/README*) continue ;;
            esac
            if ! head -n 5 "$f" | grep -qi 'synthetic'; then
              echo "ERROR: $f does not declare 'SYNTHETIC' in its first 5 lines"
              FAIL=1
            fi
          done
          if [ "$FAIL" -eq 1 ]; then exit 1; fi
          echo "OK: all sample/ fixtures properly marked"

      - name: Scan for secrets (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify .gitignore coverage
        run: |
          python3 -c "
          gi = open('.gitignore').read()
          for r in ['input/', 'output/', 'history/', '*.log', 'data/*.tsv']:
              assert r in gi, f'Missing: {r}'
          print('OK: .gitignore covers sensitive dirs')
          "
